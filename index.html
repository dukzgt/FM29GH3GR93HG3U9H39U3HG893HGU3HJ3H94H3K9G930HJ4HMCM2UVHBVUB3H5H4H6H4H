<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas de Dianita</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f2f2f2;
}

/* BLOQUEO SCROLL MODAL */
body.modal-open{
  overflow:hidden;
}

/* PORTADA */
.hero-container{
  display:flex;
  justify-content:center;
  padding:20px 0;
}

.hero-circle{
  width:190px;
  height:190px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  border:4px solid white;
}

.hero-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* GRID */
.container{
  max-width:520px;
  margin:auto;
  padding:12px;
}

.recetas{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  text-align:center;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.card h3{
  font-size:12px;
  padding:6px;
  color:#4f46e5;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  padding:15px;
  z-index:10000;
}

.modal-content{
  background:white;
  width:100%;
  max-width:400px;
  border-radius:18px;
  padding:18px;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
}

/* BOTÓN CERRAR */
.close{
  position:absolute;
  top:8px;
  right:10px;
  font-size:28px;
  cursor:pointer;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
}

.modal h2{
  color:#4f46e5;
  margin-bottom:10px;
}

.step{
  margin-top:12px;
}

.step img{
  width:100%;
  border-radius:12px;
  margin-top:5px;
}

.step p{
  font-size:14px;
  margin-top:5px;
}

</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero-container">
  <div class="hero-circle">
    <img src="img/logo.png" alt="Logo">
  </div>
</div>

<!-- GRID -->
<div class="container">

  <div class="recetas">

    <div class="card" onclick="openRecipe('Patatas')">
      <img src="img/patatasair.png">
      <h3>Patatas Fit</h3>
    </div>

    <div class="card" onclick="openRecipe('quesadilla')">
      <img src="img/quesadillasmex.png">
      <h3>Quesadillas Fit</h3>
    </div>

    <div class="card" onclick="openRecipe('kebab')">
      <img src="img/kebab.png">
      <h3>Kebab fit</h3>
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">×</span>

    <h2 id="title"></h2>
    <div id="steps"></div>

  </div>
</div>

<script>

/* RECETAS */
const recipes = {
  Patatas: [
    {text:"Utilizamos un par de patatas naturales, y lavamos muy bien."},
    {text:"Las cortamos en bastones, sin quitar la piel.", img:"img/bastones.png"},
	{text:"Volvemos a lavar las patatas"},    
	{text:"Ponemos una olla a calentar con agua hasta que esté bien caliente."},
	{text:"Una vez este la olla claiente, las añadimos a la olla durante 5 minutos.", img:"img/papashervir.png"},
	{text:"Una vez transcurridos los 5 minutos, las sacamos y las enfriamos con agua fría para cortar la cocción.", img:"img/cortacoccion.png"},
	{text:"Luego secamos muy bien las patatas.", img:"img/secadas.png"},
	{text:"Pulverizamos un chorrito de aceite de oliva"},
	{text:"Ahora añadimos las siguientes especias: jengibre, pimentón dulce, pimienta, pimentón (paprika), comino, cebolla en polvo y ajo en polvo.", img:"img/especiasv2.png"},
	{text:"Por último, las ponemos en la freidora de aire a 200 °C durante 15 minutos, dándoles la vuelta a mitad de cocción."},
  ],
  quesadilla: [
    {text:"Ponemos una olla con agua a hervir y agregamos pimienta, laurel, ajo y sal.", img:"img/ollapimienta.png"},
    {text:"Agregamos la pechuga y cocinamos de 10 a 15 minutos a máxima potencia.", img:"img/pechugaadd.png"},
	{text:"Retiramos la pechuga y la desmenuzamos bien con ayuda de dos tenedores.", img:"img/desmenuza.png"},
	{text:"Picamos una cebolla morada a daditos pequeños."},
	{text:"Preparamos una sarten a fuego medio con un poco de aceite.", img:"img/sartenfuegomedio.png"},
	{text:"Agregamos la cebolla morada y un poco de tomate, luego removemos bien para que la cebolla se impregne del tomate.", img:"img/freimoscebollatomate.png"},
	{text:"Cuando la cebolla esté pochada, añadimos el pollo desmenuzado.", img:"img/pollodes.png"},
	{text:"A continuación, agregamos dos cucharadas de salsa BBQ cero, la cantidad al gusto. Y removemos durante al menos dos minutos", img:"img/salsapollobbq.png"},
	{text:"Cuando la cebolla esté pochada, añadimos el pollo desmenuzado.", img:"img/pollodes.png"},
	{text:"Para montar la quesadilla, colocamos una tortita de trigo integral en la sartén a fuego medio y añadimos queso mozzarella.", img:"img/tortiamozarrella.png"},
	{text:"Añadimos el relleneno. y dejamos que se funda un poco el queso.", img:"img/elrellenoquesa.png"},
	{text:"Luego cerramos y listo.", img:"img/cerramosquesa.png"},
	

  ],
  kebab: [
    {text:"Empezamos preparando la salsa, añadiendo yogur griego sin azcucar en un bol, con ajo en polvo", img:"img/yogurt.png"},
	{text:"Añadimos un chorro de limon.", img:"img/climon.png"},
	{text:"Oregano y movemos todo muy bien.", img:"img/oregano.png"},
    {text:"Luego, cocinamos la carne de kebab de mercadona en air fryer durante 8–12 minutos a 190 °C.", img:"img/airkebab.png"},
    {text:"Una vez lista, cogemos una tortita integral y añadimos la salsa y lechuga, cortada fina", img:"img/salsayle.png"},
    {text:"Le añadimos la carne y un poco mas de salsa por arriba", img:"img/salsaycar.png"},
	{text:"Cerramos el rollo de kebab y ya está listo para servir"}
	
  ]
};

function openRecipe(name){

  document.getElementById("title").innerText = name;

  const steps = document.getElementById("steps");
  steps.innerHTML = "";

  recipes[name].forEach((s,i)=>{

    steps.innerHTML += `
      <div class="step">
        <strong>Paso ${i+1}</strong>
        <p>${s.text}</p>
        ${s.img ? `<img src="${s.img}" alt="">` : ""}
      </div>
    `;

  });

  document.getElementById("modal").style.display="flex";
  document.body.classList.add("modal-open");
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.body.classList.remove("modal-open");
}

/* cerrar al clicar fuera */
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this){
    closeModal();
  }
});

</script>

</body>
</html>
