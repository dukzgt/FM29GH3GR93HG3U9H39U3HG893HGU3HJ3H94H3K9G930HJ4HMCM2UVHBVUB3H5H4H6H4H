<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas de Dianita</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f2f2f2;
}

/* BLOQUEO SCROLL MODAL */
body.modal-open{
  overflow:hidden;
}

/* PORTADA */
.hero-container{
  display:flex;
  justify-content:center;
  padding:20px 0;
}

.hero-circle{
  width:190px;
  height:190px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  border:4px solid white;
}

.hero-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* GRID */
.container{
  max-width:520px;
  margin:auto;
  padding:12px;
}

/* BUSCADOR */
.search-box{
  text-align:center;
  margin-bottom:15px;
}

.search-box input{
  padding:10px;
  width:90%;
  max-width:300px;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
}

.recetas{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  text-align:center;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.card h3{
  font-size:12px;
  padding:6px;
  color:#4f46e5;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  padding:15px;
  z-index:10000;
}

.modal-content{
  background:white;
  width:100%;
  max-width:400px;
  border-radius:18px;
  padding:18px;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
}

/* BOTÓN CERRAR */
.close{
  position:absolute;
  top:8px;
  right:10px;
  font-size:28px;
  cursor:pointer;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
}

.modal h2{
  color:#4f46e5;
  margin-bottom:10px;
}

.step{
  margin-top:12px;
}

.step img{
  width:100%;
  border-radius:12px;
  margin-top:5px;
}

.step p{
  font-size:14px;
  margin-top:5px;
}

</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero-container">
  <div class="hero-circle">
    <img src="img/logo.png" alt="Logo">
  </div>
</div>

<!-- BUSCADOR -->
<div class="container">
  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar receta...">
  </div>

  <!-- GRID -->
  <div class="recetas">

    <div class="card" data-name="patatas" onclick="openRecipe('Patatas')">
      <img src="img/patatasair.png">
      <h3>Patatas Fit</h3>
    </div>

    <div class="card" data-name="quesadillas" onclick="openRecipe('quesadilla')">
      <img src="img/quesadillasmex.png">
      <h3>Quesadillas Fit</h3>
    </div>

    <div class="card" data-name="kebab" onclick="openRecipe('kebab')">
      <img src="img/kebab.png">
      <h3>Kebab Fit</h3>
    </div>

    <div class="card" data-name="snack lomo" onclick="openRecipe('snacklomo')">
      <img src="img/snacklomo.png">
      <h3>Snack caña de Lomo Fit</h3>
    </div>
	
    <div class="card" data-name="snack lomo" onclick="openRecipe('snacklomo')">
      <img src="img/snacklomo.png">
      <h3>Snack caña de Lomo Fit</h3>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">×</span>

    <h2 id="title"></h2>
    <div id="steps"></div>

  </div>
</div>

<script>

/* RECETAS */
const recipes = {
  Patatas: [
    {text:"Utilizamos un par de patatas naturales, y lavamos muy bien."},
    {text:"Las cortamos en bastones, sin quitar la piel.", img:"img/bastones.png"},
    {text:"Volvemos a lavar las patatas"},
    {text:"Ponemos una olla a calentar con agua hasta que esté bien caliente."},
    {text:"Una vez este la olla claiente, las añadimos a la olla durante 5 minutos.", img:"img/papashervir.png"},
    {text:"Una vez transcurridos los 5 minutos, las sacamos y las enfriamos con agua fría para cortar la cocción.", img:"img/cortacoccion.png"},
    {text:"Luego secamos muy bien las patatas.", img:"img/secadas.png"},
    {text:"Pulverizamos un chorrito de aceite de oliva"},
    {text:"Ahora añadimos las siguientes especias: jengibre, pimentón dulce, pimienta, pimentón (paprika), comino, cebolla en polvo y ajo en polvo.", img:"img/especiasv2.png"},
    {text:"Por último, las ponemos en la freidora de aire a 200 °C durante 15 minutos, dándoles la vuelta a mitad de cocción."},
  ],
  quesadilla: [
    {text:"Ponemos una olla con agua a hervir y agregamos pimienta, laurel, ajo y sal.", img:"img/ollapimienta.png"},
    {text:"Agregamos la pechuga y cocinamos de 10 a 15 minutos a máxima potencia.", img:"img/pechugaadd.png"},
    {text:"Retiramos la pechuga y la desmenuzamos bien con ayuda de dos tenedores.", img:"img/desmenuza.png"},
    {text:"Picamos una cebolla morada a daditos pequeños."},
    {text:"Preparamos una sarten a fuego medio con un poco de aceite.", img:"img/sartenfuegomedio.png"},
    {text:"Agregamos la cebolla morada y un poco de tomate, luego removemos bien.", img:"img/freimoscebollatomate.png"},
    {text:"Cuando la cebolla esté pochada, añadimos el pollo desmenuzado.", img:"img/pollodes.png"},
    {text:"Agregamos dos cucharadas de salsa BBQ cero y removemos.", img:"img/salsapollobbq.png"},
    {text:"Para montar la quesadilla añadimos queso mozzarella.", img:"img/tortiamozarrella.png"},
    {text:"Añadimos el relleno y dejamos que se funda el queso.", img:"img/elrellenoquesa.png"},
    {text:"Cerramos y listo.", img:"img/cerramosquesa.png"},
  ],
  kebab: [
    {text:"Preparamos salsa con yogur griego sin azúcar y ajo en polvo.", img:"img/yogurt.png"},
    {text:"Añadimos limón.", img:"img/climon.png"},
    {text:"Añadimos orégano.", img:"img/oregano.png"},
    {text:"Cocinamos carne de kebab en air fryer 8–12 min a 190°C.", img:"img/airkebab.png"},
    {text:"Montamos con tortita integral, salsa y lechuga.", img:"img/salsayle.png"},
    {text:"Añadimos la carne y más salsa.", img:"img/salsaycar.png"},
    {text:"Cerramos el kebab."}
  ],
  snacklomo: [
    {text:"Ponemos la caña de lomo en la air fryer.", img:"img/airlomo.png"},
    {text:"200°C durante 10 minutos, dando la vuelta a mitad.", img:"img/vueltalomo.png"},
    {text:"Listo para servir."}
  ]
};

function openRecipe(name){

  document.getElementById("title").innerText = name;

  const steps = document.getElementById("steps");
  steps.innerHTML = "";

  recipes[name].forEach((s,i)=>{
    steps.innerHTML += `
      <div class="step">
        <strong>Paso ${i+1}</strong>
        <p>${s.text}</p>
        ${s.img ? `<img src="${s.img}" alt="">` : ""}
      </div>
    `;
  });

  document.getElementById("modal").style.display="flex";
  document.body.classList.add("modal-open");
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.body.classList.remove("modal-open");
}

/* cerrar fuera */
document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this){
    closeModal();
  }
});

/* BUSCADOR */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", function(){
  const value = this.value.toLowerCase();

  cards.forEach(card=>{
    const name = card.getAttribute("data-name").toLowerCase();
    card.style.display = name.includes(value) ? "block" : "none";
  });
});

</script>

</body>
</html>
