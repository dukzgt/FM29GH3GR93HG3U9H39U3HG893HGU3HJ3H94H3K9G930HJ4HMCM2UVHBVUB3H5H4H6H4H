<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas de Dianita</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f2f2f2;
}

body.modal-open{
  overflow:hidden;
}

/* PORTADA */
.hero-container{
  display:flex;
  justify-content:center;
  padding:20px 0;
}

.hero-circle{
  width:190px;
  height:190px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  border:4px solid white;
}

.hero-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.container{
  max-width:520px;
  margin:auto;
  padding:12px;
}

.search-box{
  text-align:center;
  margin-bottom:15px;
}

.search-box input{
  padding:10px;
  width:90%;
  max-width:300px;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
}

.recetas{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  text-align:center;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.card h3{
  font-size:12px;
  padding:6px;
  color:#4f46e5;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  padding:15px;
  z-index:10000;
}

.modal-content{
  background:white;
  width:100%;
  max-width:400px;
  border-radius:18px;
  padding:18px;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
}

.close{
  position:absolute;
  top:8px;
  right:10px;
  font-size:28px;
  cursor:pointer;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
}

.modal h2{
  color:#4f46e5;
  margin-bottom:10px;
}

.step{
  margin-top:12px;
}

.step img{
  width:100%;
  border-radius:12px;
  margin-top:5px;
}

.step p{
  font-size:14px;
  margin-top:5px;
}
</style>
</head>

<body>

<!-- PORTADA -->
<div class="hero-container">
  <div class="hero-circle">
    <img src="img/logo.png" alt="Logo">
  </div>
</div>

<div class="container">

  <!-- BUSCADOR -->
  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar receta...">
  </div>

  <!-- GRID -->
  <div class="recetas">

    <div class="card" data-name="patatas" onclick="openRecipe('Patatas')">
      <img src="img/patatasair.png">
      <h3>Patatas saludable</h3>
    </div>

    <div class="card" data-name="quesadillas" onclick="openRecipe('quesadilla')">
      <img src="img/quesadillasmex.png">
      <h3>Quesadillas Mexicanas saludable</h3>
    </div>

    <div class="card" data-name="kebab" onclick="openRecipe('kebab')">
      <img src="img/kebab.png">
      <h3>Kebab saludable</h3>
    </div>

    <div class="card" data-name="snacklomo" onclick="openRecipe('snacklomo')">
      <img src="img/snacklomo.png">
      <h3>Snack caña de Lomo saludable</h3>
    </div>

    <div class="card" onclick="openRecipe('calzones')">
      <img src="img/pizzacalzones.png">
      <h3>Pizza calzones saludable</h3>
    </div>

    <div class="card" onclick="openRecipe('pizzaza')">
      <img src="img/pizzazanahoria.png">
      <h3>Mini pizzas de zanahoria saludable</h3>
    </div>

    <div class="card" onclick="openRecipe('calzonatun')">
      <img src="img/calzonatun.png">
      <h3>Calzón de atún saludable</h3>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="title"></h2>
    <div id="steps"></div>
  </div>
</div>

<script>
let recipes = {};

/* CARGAR JSON */
fetch("recipes.json")
  .then(res => res.json())
  .then(data => {
    recipes = data;
  });

function openRecipe(name){

  if(!recipes[name]){
    alert("Receta en carga...");
    return;
  }

  document.getElementById("title").innerText = name;

  const steps = document.getElementById("steps");
  steps.innerHTML = "";

  recipes[name].forEach((s,i)=>{
    steps.innerHTML += `
      <div class="step">
        <strong>Paso ${i+1}</strong>
        <p>${s.text}</p>
        ${s.img ? `<img src="${s.img}">` : ""}
      </div>
    `;
  });

  document.getElementById("modal").style.display="flex";
  document.body.classList.add("modal-open");
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.body.classList.remove("modal-open");
}

document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this){
    closeModal();
  }
});

/* BUSCADOR */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", function(){
  const value = this.value.toLowerCase();

  cards.forEach(card=>{
    const name = card.getAttribute("data-name").toLowerCase();
    card.style.display = name.includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
